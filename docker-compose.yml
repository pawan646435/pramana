services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pramana
      POSTGRES_PASSWORD: pramana
      POSTGRES_DB: pramana
    ports:
      - "5432:5432"
    volumes:
      - pramana_pgdata:/var/lib/postgresql/data

  # For containerized/deployment use only - local dev uses Homebrew
  # Redis directly (see docs/phase5.md for why).
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pramana_pgdata:
